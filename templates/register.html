{% extends "base.html" %}
{% block title %}Inscription — ApartmentAI{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="glass-card p-4 mt-4">
      <div class="text-center mb-4">
        <div class="auth-icon mb-2"><i class="bi bi-person-plus"></i></div>
        <h4 class="fw-bold">Créer un compte</h4>
        <p class="text-muted small">Gratuit — sauvegardez vos recherches</p>
      </div>
      <div id="regErr" class="alert alert-danger d-none small"></div>
      <div class="mb-3">
        <label class="form-label small fw-semibold">Nom d'utilisateur</label>
        <input type="text" id="regUser" class="form-control" placeholder="Mohamed"/>
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold">Email</label>
        <input type="email" id="regEmail" class="form-control" placeholder="vous@exemple.com"/>
      </div>
      <div class="mb-4">
        <label class="form-label small fw-semibold">Mot de passe</label>
        <input type="password" id="regPwd" class="form-control" placeholder="min. 6 caractères"/>
      </div>
      <button class="btn btn-primary w-100 fw-semibold" onclick="doRegister()">
        <i class="bi bi-person-check me-2"></i>S'inscrire
      </button>
      <p class="text-center text-muted small mt-3">
        Déjà inscrit ? <a href="/login" class="text-accent">Connexion</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function doRegister() {
  const username = document.getElementById('regUser').value.trim();
  const email    = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPwd').value;
  const err      = document.getElementById('regErr');
  err.classList.add('d-none');
  try {
    const r = await fetch('/api/auth/register', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username, email, password})
    });
    const d = await r.json();
    if (!r.ok) { err.textContent = d.error; err.classList.remove('d-none'); return; }
    window.location.href = '/';
  } catch(e) { err.textContent = 'Erreur réseau.'; err.classList.remove('d-none'); }
}
</script>
{% endblock %}
