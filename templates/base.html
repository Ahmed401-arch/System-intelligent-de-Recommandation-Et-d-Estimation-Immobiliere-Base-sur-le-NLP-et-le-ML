<!DOCTYPE html>
<html lang="fr" data-bs-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}ApartmentAI{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="/static/css/main.css" rel="stylesheet"/>
  {% block head %}{% endblock %}
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark navbar-main">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold" href="/">
      <i class="bi bi-buildings me-2 text-primary"></i>Apartment<span class="text-accent">AI</span>
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto gap-1">
        <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-search me-1"></i>Recherche</a></li>
        <li class="nav-item"><a class="nav-link" href="/map"><i class="bi bi-map me-1"></i>Carte</a></li>
        <li class="nav-item" id="navHistory" style="display:none">
          <a class="nav-link" href="/history"><i class="bi bi-clock-history me-1"></i>Historique</a></li>
        <li class="nav-item" id="navFavs" style="display:none">
          <a class="nav-link" href="/favorites"><i class="bi bi-heart me-1"></i>Favoris</a></li>
        <li class="nav-item" id="navDash" style="display:none">
          <a class="nav-link" href="/dashboard"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
          <a class="nav-link" href="/ml-dashboard" id="navML"><i class="bi bi-robot me-1"></i>ML Analytics</a></li>
      </ul>
      <div class="d-flex align-items-center gap-2" id="authArea">
        <span class="text-muted small" id="guestLinks">
          <a href="/login" class="btn btn-sm btn-outline-primary me-1">Connexion</a>
          <a href="/register" class="btn btn-sm btn-primary">Inscription</a>
        </span>
        <span id="userLinks" style="display:none" class="d-flex align-items-center gap-2">
          <span class="badge bg-primary-subtle text-primary" id="navUsername"></span>
          <button class="btn btn-sm btn-outline-danger" onclick="logout()">
            <i class="bi bi-box-arrow-right"></i>
          </button>
        </span>
      </div>
    </div>
  </div>
</nav>

<main class="{% block mainclass %}container py-4{% endblock %}">
  {% block content %}{% endblock %}
</main>

<div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999"></div>
<div id="globalSpinner" class="spinner-overlay d-none">
  <div class="spinner-box">
    <div class="spinner-border text-primary mb-3" style="width:3rem;height:3rem"></div>
    <p id="spinnerMsg" class="mb-0 fw-semibold text-light">Traitement…</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/auth.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
